[general]
; Game resolution. Common values include 1280x720, 1366x768, 1600x900, and 1920x1080.
width=1280
height=720

[customDlls]
; Optional extra DLLs to load before Ezorsia applies client patches.
; Leave blank to disable. Paths are relative to the game folder unless absolute.
dll1=
dll2=
dll3=

[debug]
; Delay patch application while the packed client finishes unpacking.
; Increase this only when the game fails to launch. Default: 0 milliseconds.
sleepTime=0
